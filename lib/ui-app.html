<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<title>dev-memory UI</title>
<style>
:root {
  --fg: #1f2328;
  --fg-muted: #59636e;
  --fg-subtle: #8b949e;
  --bg: #f6f8fa;
  --bg-card: #ffffff;
  --bg-hover: #f0f3f6;
  --bg-active: #ddf4ff;
  --border: #d1d9e0;
  --border-subtle: rgba(209, 217, 224, 0.6);
  --accent: #0969da;
  --accent-fg: #ffffff;
  --tag-bg: #eff2f5;
  --tag-fg: #59636e;
  --archived-bg: #fff8c5;
  --archived-fg: #9a6700;
  --success-bg: #dafbe1;
  --success-fg: #1a7f37;
  --warning-bg: #fff8c5;
  --warning-fg: #9a6700;
  --danger-bg: #ffebe9;
  --danger-fg: #cf222e;
  --idle-bg: #eff2f5;
  --idle-fg: #59636e;
  --shadow-sm: 0 1px 2px rgba(31,35,40,0.04);
  --shadow-md: 0 4px 12px rgba(31,35,40,0.1);
  --radius: 8px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --fg: #e6edf3;
    --fg-muted: #8b949e;
    --fg-subtle: #6e7681;
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --bg-active: #1f2d44;
    --border: #30363d;
    --border-subtle: rgba(48, 54, 61, 0.5);
    --accent: #58a6ff;
    --accent-fg: #0d1117;
    --tag-bg: #262c36;
    --tag-fg: #8b949e;
    --archived-bg: #4d3800;
    --archived-fg: #eac54f;
    --success-bg: #033d1a;
    --success-fg: #3fb950;
    --warning-bg: #4d3800;
    --warning-fg: #eac54f;
    --danger-bg: #490202;
    --danger-fg: #ff7b72;
    --idle-bg: #262c36;
    --idle-fg: #8b949e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
  }
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", system-ui, sans-serif;
  color: var(--fg);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
button { font-family: inherit; }

.app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.topbar .brand { display: flex; align-items: baseline; gap: 12px; min-width: 0; }
.topbar .title { font-weight: 600; font-size: 15px; }
.topbar .meta { color: var(--fg-muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.view-tabs { display: flex; gap: 4px; }
.view-tab { padding: 6px 10px; border: 1px solid var(--border); background: var(--bg-card); color: var(--fg); border-radius: var(--radius-sm); cursor: pointer; }
.view-tab.active { color: var(--accent-fg); background: var(--accent); border-color: var(--accent); }
.scan-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); font-size: 12px; }
.scan-table th, .scan-table td { padding: 9px 10px; text-align: left; border-bottom: 1px solid var(--border-subtle); vertical-align: top; }
.scan-table th { color: var(--fg-muted); background: var(--bg); font-weight: 600; }
.scan-table tr:last-child td { border-bottom: 0; }
.scan-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.scan-intro {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; margin-bottom: 18px;
}
.scan-intro .eyebrow {
  color: var(--fg-muted); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px;
}
.scan-intro .path { max-width: 720px; }
.scan-live {
  display: inline-flex; align-items: center; gap: 7px;
  color: var(--success-fg); font-size: 12px; white-space: nowrap;
}
.scan-live::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: currentColor; box-shadow: 0 0 0 4px var(--success-bg);
}
.pulse-panel {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm);
}
.pulse-header {
  display: flex; justify-content: space-between; gap: 16px;
  color: var(--fg-muted); font-size: 11px; margin-bottom: 10px;
}
.pulse-strip {
  display: grid; grid-template-columns: repeat(50, minmax(4px, 1fr));
  align-items: end; gap: 3px; height: 34px;
}
.pulse {
  width: 100%; min-width: 4px; height: 16px; padding: 0;
  border: 0; border-radius: 2px; cursor: pointer;
  background: var(--idle-fg); opacity: 0.36;
  transition: transform 0.12s, opacity 0.12s;
}
.pulse:hover, .pulse:focus-visible { transform: scaleY(1.25); opacity: 1; outline: none; }
.pulse.processed { height: 28px; background: var(--success-fg); opacity: 0.9; }
.pulse.attention { height: 32px; background: var(--danger-fg); opacity: 0.9; }
.pulse.pending, .pulse.dry_run { height: 24px; background: var(--warning-fg); opacity: 0.85; }
.pulse.skipped_running { height: 10px; background: var(--accent); opacity: 0.75; }
.pulse-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; color: var(--fg-muted); font-size: 10px; }
.pulse-legend span { display: inline-flex; align-items: center; gap: 5px; }
.pulse-legend i { width: 7px; height: 7px; border-radius: 2px; background: var(--idle-fg); }
.pulse-legend .ok i { background: var(--success-fg); }
.pulse-legend .bad i { background: var(--danger-fg); }
.pulse-legend .work i { background: var(--warning-fg); }
.run-ledger { display: grid; gap: 8px; }
.run-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm);
}
.run-summary {
  width: 100%; display: grid;
  grid-template-columns: minmax(220px, 1.2fr) minmax(160px, 0.8fr) repeat(4, minmax(66px, auto)) 18px;
  align-items: center; gap: 12px; padding: 12px 14px;
  border: 0; background: transparent; color: var(--fg); text-align: left; cursor: pointer;
}
.run-summary:hover { background: var(--bg-hover); }
.run-summary:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.run-time { font-weight: 600; font-size: 13px; }
.run-id { color: var(--fg-subtle); font-size: 10px; margin-top: 2px; }
.run-engine { color: var(--fg-muted); font-size: 11px; }
.run-metric { text-align: right; font-variant-numeric: tabular-nums; }
.run-metric strong { display: block; font-size: 13px; font-weight: 600; }
.run-metric span { color: var(--fg-subtle); font-size: 9px; text-transform: uppercase; letter-spacing: 0.45px; }
.run-chevron { color: var(--fg-subtle); font-size: 14px; transition: transform 0.12s; }
.run-card.open .run-chevron { transform: rotate(90deg); }
.status-pill {
  display: inline-flex; align-items: center; justify-content: center;
  width: fit-content; padding: 3px 8px; border-radius: 999px;
  background: var(--idle-bg); color: var(--idle-fg); font-size: 10px; font-weight: 600;
}
.status-pill.processed { background: var(--success-bg); color: var(--success-fg); }
.status-pill.attention { background: var(--danger-bg); color: var(--danger-fg); }
.status-pill.pending, .status-pill.dry_run { background: var(--warning-bg); color: var(--warning-fg); }
.status-pill.skipped_running { background: var(--bg-active); color: var(--accent); }
.run-detail { display: none; padding: 14px; border-top: 1px solid var(--border-subtle); background: var(--bg); }
.run-card.open .run-detail { display: block; }
.reason-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.reason-chip {
  padding: 4px 8px; border: 1px solid var(--border-subtle); border-radius: 999px;
  background: var(--bg-card); color: var(--fg-muted); font-size: 10px;
}
.task-result { min-width: 180px; }
.task-result .error { color: var(--danger-fg); margin-top: 3px; word-break: break-word; }
.task-result .targets { color: var(--fg-muted); margin-top: 3px; word-break: break-word; }
.task-table-wrap { overflow-x: auto; }
@media (max-width: 960px) {
  .pulse-strip { grid-template-columns: repeat(25, minmax(5px, 1fr)); height: 70px; }
  .run-summary { grid-template-columns: 1fr auto auto; }
  .run-summary .run-engine, .run-summary .run-metric:nth-of-type(n+3) { display: none; }
}

.main { display: grid; grid-template-columns: 320px 1fr; overflow: hidden; min-height: 0; }

.sidebar {
  overflow-y: auto;
  border-right: 1px solid var(--border);
  padding: 14px 12px;
  background: var(--bg);
}
.search {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  color: var(--fg);
  margin-bottom: 12px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.1s;
}
.search:focus { border-color: var(--accent); }

.repo-card {
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 8px;
  transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
}
.repo-card:hover { background: var(--bg-hover); box-shadow: var(--shadow-sm); }
.repo-card.active {
  border-color: var(--accent);
  background: var(--bg-active);
}
.repo-card .name {
  font-weight: 600; font-size: 14px;
  word-break: break-word;
  display: flex; align-items: center; gap: 6px;
}
.repo-card .sub {
  color: var(--fg-subtle);
  font-size: 11px;
  margin-top: 3px;
  word-break: break-all;
  line-height: 1.4;
}
.repo-card .badges { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }

.content {
  overflow-y: auto;
  padding: 24px 28px;
  min-width: 0;
}
.content > .placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 80%; color: var(--fg-muted); font-size: 13px;
}

.repo-header h2 {
  margin: 0; font-size: 22px; font-weight: 600;
  word-break: break-word;
}
.repo-header .repo-key {
  color: var(--fg-subtle); font-size: 12px;
  margin-top: 4px; word-break: break-all;
}
.repo-header .path {
  color: var(--fg-muted); font-size: 13px;
  margin-top: 6px; word-break: break-all;
}

.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px; margin: 18px 0;
}
.stat {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 10px 14px;
}
.stat .label {
  color: var(--fg-muted); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 500;
}
.stat .value {
  font-size: 18px; font-weight: 600; margin-top: 4px;
  word-break: break-word; line-height: 1.3;
}
.stat .value.sm { font-size: 13px; font-weight: 500; color: var(--fg); }

.section-title {
  font-size: 11px; font-weight: 600;
  color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin: 28px 0 12px;
}

.branch-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.branch-tab {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--fg);
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.1s;
}
.branch-tab:hover { background: var(--bg-hover); }
.branch-tab.active {
  background: var(--accent); color: var(--accent-fg);
  border-color: var(--accent);
}
.branch-tab.active .tag { background: rgba(255,255,255,0.25); color: var(--accent-fg); }

.file-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: 1fr;
  align-items: stretch;
}
@media (min-width: 1100px) {
  .file-grid { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 1600px) {
  .file-grid { grid-template-columns: 1fr 1fr 1fr; }
}
.file-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.1s, transform 0.1s;
  display: flex;
  flex-direction: column;
}
.file-card.clickable { cursor: pointer; }
.file-card.clickable:hover { box-shadow: var(--shadow-md); }
.file-card > header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg);
  gap: 12px;
}
.file-card .fname { font-weight: 600; font-size: 13px; }
.file-card .fmeta { color: var(--fg-subtle); font-size: 11px; flex-shrink: 0; }
.file-card .preview {
  padding: 12px 14px;
  flex: 1;
  min-height: 120px;
  max-height: 280px;
  overflow: hidden;
  position: relative;
  font-size: 12px;
  line-height: 1.6;
  word-break: break-word;
}
.file-card .preview.plain {
  white-space: pre-wrap;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

.md {
  color: var(--fg);
}
.md > :first-child { margin-top: 0; }
.md > :last-child { margin-bottom: 0; }
.md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
  margin: 14px 0 6px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--fg);
}
.md h1 { font-size: 1.25em; border-bottom: 1px solid var(--border-subtle); padding-bottom: 4px; }
.md h2 { font-size: 1.15em; border-bottom: 1px solid var(--border-subtle); padding-bottom: 3px; }
.md h3 { font-size: 1.05em; }
.md h4 { font-size: 1em; color: var(--fg-muted); }
.md h5, .md h6 { font-size: 0.95em; color: var(--fg-muted); }
.md p { margin: 6px 0; }
.md ul, .md ol { margin: 6px 0; padding-left: 22px; }
.md li { margin: 2px 0; }
.md li > ul, .md li > ol { margin: 2px 0; }
.md code {
  background: var(--tag-bg);
  color: var(--fg);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.88em;
}
.md pre.code {
  background: var(--bg);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  overflow-x: auto;
  margin: 10px 0;
  font-size: 0.9em;
  line-height: 1.55;
}
.md pre.code code {
  background: none;
  padding: 0;
  font-size: inherit;
  color: inherit;
  white-space: pre;
}
.md blockquote {
  border-left: 3px solid var(--border);
  padding: 2px 12px;
  color: var(--fg-muted);
  margin: 8px 0;
}
.md blockquote p { margin: 4px 0; }
.md a { color: var(--accent); text-decoration: none; }
.md a:hover { text-decoration: underline; }
.md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.md strong { font-weight: 600; }
.md em { font-style: italic; }
.md table {
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 0.95em;
}
.md th, .md td {
  border: 1px solid var(--border);
  padding: 4px 10px;
  text-align: left;
}
.md th { background: var(--bg); font-weight: 600; }
.file-card .preview.truncated::after {
  content: "";
  position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
  background: linear-gradient(transparent, var(--bg-card));
  pointer-events: none;
}
.file-card .preview.empty { color: var(--fg-subtle); font-style: italic; }
.file-card .expand-btn {
  padding: 8px 14px;
  text-align: center;
  color: var(--accent);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg);
  transition: background 0.1s;
}
.file-card .expand-btn:hover { background: var(--bg-hover); }

.tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--tag-bg);
  color: var(--tag-fg);
  font-weight: 500;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.tag.archived { background: var(--archived-bg); color: var(--archived-fg); }
.tag.success { background: var(--success-bg); color: var(--success-fg); }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10, 15, 25, 0.55);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 40px 20px;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; animation: fadeIn 0.12s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-card);
  border-radius: var(--radius);
  width: 100%; max-width: 960px; max-height: 100%;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.modal > header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.modal .mtitle { font-size: 13px; word-break: break-all; min-width: 0; }
.modal .close {
  cursor: pointer; color: var(--fg-muted);
  font-size: 22px; line-height: 1; padding: 0 8px;
  background: none; border: none; border-radius: var(--radius-sm);
}
.modal .close:hover { color: var(--fg); background: var(--bg-hover); }
.modal .body { overflow-y: auto; padding: 18px 24px; font-size: 14px; line-height: 1.7; }
.modal .body pre.raw {
  margin: 0; font-size: 13px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.modal .mactions { display: flex; align-items: center; gap: 6px; }
.modal .editor {
  width: 100%;
  min-height: 60vh;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  resize: vertical;
  outline: none;
  box-sizing: border-box;
}
.modal .editor:focus { border-color: var(--accent); }
.modal .status {
  font-size: 12px;
  margin-top: 8px;
  color: var(--fg-muted);
  min-height: 18px;
  word-break: break-word;
}
.modal .status.error { color: #cf222e; }
.modal .status.success { color: var(--success-fg); }
@media (prefers-color-scheme: dark) {
  .modal .status.error { color: #ff7b72; }
}

.empty-state {
  text-align: center;
  color: var(--fg-muted); font-size: 13px;
  padding: 32px 16px;
  background: var(--bg-card);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
.loading { color: var(--fg-subtle); font-size: 12px; font-style: italic; }

button.icon-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  color: var(--fg-muted);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.1s;
}
button.icon-btn:hover {
  background: var(--bg-hover); color: var(--fg);
  border-color: var(--fg-muted);
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <span class="title">dev-memory UI</span>
      <span class="meta" id="meta">加载中…</span>
    </div>
    <div class="actions">
      <span class="view-tabs">
        <button class="view-tab active" id="memoryView">记忆</button>
        <button class="view-tab" id="scanView">扫描任务</button>
      </span>
      <button class="icon-btn" id="reload" title="重新加载">↻ 刷新</button>
    </div>
  </div>
  <div class="main">
    <aside class="sidebar">
      <input class="search" id="search" placeholder="搜索仓库…" autocomplete="off"/>
      <div id="repoList"></div>
    </aside>
    <section class="content" id="content">
      <div class="placeholder">← 从左侧选择一个仓库</div>
    </section>
  </div>
</div>

<div class="modal-overlay" id="modal" role="dialog" aria-hidden="true">
  <div class="modal">
    <header>
      <span id="modalTitle" class="mtitle mono"></span>
      <div class="mactions">
        <button class="icon-btn" id="modalEdit" hidden>✎ 编辑</button>
        <button class="icon-btn" id="modalSave" hidden>保存</button>
        <button class="icon-btn" id="modalCancel" hidden>取消</button>
        <button class="close" id="modalClose" aria-label="关闭">×</button>
      </div>
    </header>
    <div class="body">
      <div id="modalBody"></div>
      <div class="status" id="modalStatus"></div>
    </div>
  </div>
</div>

<script>
"use strict";

var state = {
  tree: null,
  scan: null,
  view: "memory",
  selectedRepoKey: null,
  selectedBranch: null,
  fileCache: new Map(),
  runDetails: new Map(),
  readOnly: false,
};

var modalState = {
  relPath: null,
  text: "",
  editing: false,
};

function q(sel) { return document.querySelector(sel); }

function el(tag, attrs) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      var v = attrs[k];
      if (v == null || v === false) continue;
      if (k === "class") e.className = v;
      else if (k === "onclick") e.onclick = v;
      else if (k === "html") e.innerHTML = v;
      else e.setAttribute(k, v);
    }
  }
  for (var i = 2; i < arguments.length; i++) {
    var c = arguments[i];
    if (c == null || c === false) continue;
    if (Array.isArray(c)) {
      for (var j = 0; j < c.length; j++) {
        if (c[j] == null || c[j] === false) continue;
        e.appendChild(
          typeof c[j] === "string" || typeof c[j] === "number"
            ? document.createTextNode(String(c[j]))
            : c[j]
        );
      }
    } else {
      e.appendChild(
        typeof c === "string" || typeof c === "number"
          ? document.createTextNode(String(c))
          : c
      );
    }
  }
  return e;
}

function displayName(repo) {
  if (repo.identity) {
    var parts = repo.identity.split("/");
    var last = parts[parts.length - 1];
    if (last) return last;
  }
  return repo.key.replace(/-[a-f0-9]{12}$/, "");
}

function formatDateShort(iso) {
  if (!iso) return "";
  try { return new Date(iso).toLocaleDateString(); } catch (e) { return iso; }
}

function formatDateTime(iso) {
  if (!iso) return "";
  try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function renderInline(s) {
  var out = escapeHtml(s);
  // inline code first so its content isn't further transformed
  var codeSpans = [];
  out = out.replace(/`([^`]+)`/g, function (_m, g) {
    codeSpans.push(g);
    return "␀" + (codeSpans.length - 1) + "␀";
  });
  out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  out = out.replace(/__([^_]+)__/g, "<strong>$1</strong>");
  out = out.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  out = out.replace(/(^|[^_])_([^_\n]+)_/g, "$1<em>$2</em>");
  out = out.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  out = out.replace(/␀(\d+)␀/g, function (_m, i) {
    return "<code>" + codeSpans[Number(i)] + "</code>";
  });
  return out;
}

function renderMd(text) {
  if (!text) return "";
  var lines = text.replace(/\r\n?/g, "\n").split("\n");
  var out = [];
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];
    var fence = /^```+\s*(\w*)\s*$/.exec(line);
    if (fence) {
      var buf = [];
      i++;
      while (i < lines.length && !/^```+\s*$/.test(lines[i])) {
        buf.push(lines[i]);
        i++;
      }
      i++;
      out.push('<pre class="code"><code>' + escapeHtml(buf.join("\n")) + "</code></pre>");
      continue;
    }
    var h = /^(#{1,6})\s+(.+?)\s*#*\s*$/.exec(line);
    if (h) {
      var lvl = h[1].length;
      out.push("<h" + lvl + ">" + renderInline(h[2]) + "</h" + lvl + ">");
      i++;
      continue;
    }
    if (/^\s*(---|\*\*\*|___)\s*$/.test(line)) {
      out.push("<hr/>");
      i++;
      continue;
    }
    if (/^>\s?/.test(line)) {
      var bq = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        bq.push(lines[i].replace(/^>\s?/, ""));
        i++;
      }
      out.push("<blockquote><p>" + renderInline(bq.join(" ")) + "</p></blockquote>");
      continue;
    }
    if (/^\s*[-*+]\s+/.test(line)) {
      var items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        items.push("<li>" + renderInline(lines[i].replace(/^\s*[-*+]\s+/, "")) + "</li>");
        i++;
      }
      out.push("<ul>" + items.join("") + "</ul>");
      continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      var oitems = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        oitems.push("<li>" + renderInline(lines[i].replace(/^\s*\d+\.\s+/, "")) + "</li>");
        i++;
      }
      out.push("<ol>" + oitems.join("") + "</ol>");
      continue;
    }
    if (line.trim() === "") { i++; continue; }
    var para = [];
    while (
      i < lines.length &&
      lines[i].trim() !== "" &&
      !/^(#{1,6}\s|```+|>\s?|\s*[-*+]\s|\s*\d+\.\s|\s*(---|\*\*\*|___)\s*$)/.test(lines[i])
    ) {
      para.push(lines[i]);
      i++;
    }
    if (para.length) out.push("<p>" + renderInline(para.join(" ")) + "</p>");
  }
  return out.join("");
}

function fileRelPath(repoKey, branch, filename, scope) {
  if (scope === "repo") return repoKey + "/repo/" + filename;
  if (scope === "branch-archived") return repoKey + "/branches/_archived/" + branch + "/" + filename;
  return repoKey + "/branches/" + branch + "/" + filename;
}

function fetchFile(relPath) {
  if (state.fileCache.has(relPath)) {
    return Promise.resolve(state.fileCache.get(relPath));
  }
  return fetch("/api/file?path=" + encodeURIComponent(relPath)).then(function (r) {
    if (!r.ok) throw new Error(r.status + " " + r.statusText);
    return r.text();
  }).then(function (text) {
    state.fileCache.set(relPath, text);
    return text;
  });
}

function stat(label, value, small) {
  return el("div", { class: "stat" },
    el("div", { class: "label" }, label),
    el("div", { class: "value" + (small ? " sm" : "") }, String(value))
  );
}

function formatBytes(value) {
  var n = Number(value || 0);
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
  return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
}

function formatDuration(value) {
  var ms = Number(value || 0);
  if (ms < 1000) return ms + " ms";
  if (ms < 60000) return (ms / 1000).toFixed(ms < 10000 ? 1 : 0) + " 秒";
  return Math.floor(ms / 60000) + "分 " + Math.round((ms % 60000) / 1000) + "秒";
}

function outcomeLabel(outcome) {
  return {
    processed: "已处理",
    attention: "有失败",
    idle: "空轮询",
    pending: "有候选",
    dry_run: "预演",
    skipped_running: "避让重叠",
  }[outcome] || outcome || "未知";
}

function taskStatusLabel(status) {
  return {
    done: "已写入",
    failed: "失败",
    skipped_summary: "无需写入",
    candidate: "候选",
    skipped: "已跳过",
  }[status] || status || "未知";
}

function reasonLabel(reason) {
  return {
    not_stopped: "未收到 Stop",
    not_idle: "静默不足 30 分钟",
    changed_after_stop: "Stop 后仍有写入（历史）",
    unchanged: "没有新增内容",
    excluded_internal: "内部维护会话",
    excluded_automation: "自动化会话",
    memory_not_initialized: "未初始化记忆",
    cwd_not_found: "工作目录不存在",
    workspace_primary_required: "工作区未指定主仓库",
    no_semantic_messages: "没有可总结消息",
  }[reason] || reason || "未知";
}

function renderRunDetail(container, detail) {
  container.innerHTML = "";
  var reasons = detail.discovery && detail.discovery.reason_counts || {};
  var reasonKeys = Object.keys(reasons).sort(function (a, b) { return reasons[b] - reasons[a]; });
  if (reasonKeys.length) {
    var reasonGrid = el("div", { class: "reason-grid" });
    reasonKeys.forEach(function (reason) {
      reasonGrid.appendChild(el("span", { class: "reason-chip" }, reasonLabel(reason) + " · " + reasons[reason]));
    });
    container.appendChild(reasonGrid);
  }

  if (!detail.tasks || detail.tasks.length === 0) {
    container.appendChild(el("div", { class: "empty-state" }, "本轮没有合格任务，扫描在发现阶段结束。"));
    return;
  }

  var wrap = el("div", { class: "task-table-wrap" });
  var table = el("table", { class: "scan-table" });
  table.innerHTML = "<thead><tr><th>会话 / 仓库</th><th>输入</th><th>游标</th><th>任务结果</th></tr></thead>";
  var body = el("tbody");
  detail.tasks.forEach(function (task) {
    var result = el("div", { class: "task-result" },
      el("span", { class: "status-pill " + (task.status === "failed" ? "attention" : task.status === "done" ? "processed" : "pending") }, taskStatusLabel(task.status))
    );
    if (task.reason) result.appendChild(el("div", { class: "targets" }, reasonLabel(task.reason)));
    if (task.error) result.appendChild(el("div", { class: "error" }, task.error));
    if (task.touched_targets && task.touched_targets.length) {
      result.appendChild(el("div", { class: "targets mono" }, task.touched_targets.join(" · ")));
    }
    body.appendChild(el("tr", null,
      el("td", null,
        el("div", { class: "mono" }, task.session_id || "-"),
        el("div", null, [task.repo_key, task.branch].filter(Boolean).join(" / ") || "未解析仓库"),
        el("div", { class: "sub mono" }, task.cwd || task.path || "")
      ),
      el("td", null,
        el("div", null, formatBytes(task.new_bytes) + " 新增"),
        el("div", { class: "sub" }, task.semantic_messages + " 条语义消息" + (task.stop_snapshot_changed ? " · Stop 后有续写" : ""))
      ),
      el("td", { class: "mono" }, task.cursor_before + " → " + (task.cursor_after == null ? "未推进" : task.cursor_after)),
      el("td", null, result)
    ));
  });
  table.appendChild(body);
  wrap.appendChild(table);
  container.appendChild(wrap);
}

function toggleRun(card, runId) {
  var detailNode = card.querySelector(".run-detail");
  var button = card.querySelector(".run-summary");
  var willOpen = !card.classList.contains("open");
  card.classList.toggle("open", willOpen);
  button.setAttribute("aria-expanded", willOpen ? "true" : "false");
  if (!willOpen || detailNode.dataset.loaded === "true") return;
  detailNode.innerHTML = '<div class="loading">读取本轮任务…</div>';
  var cached = state.runDetails.get(runId);
  var request = cached
    ? Promise.resolve(cached)
    : fetch("/api/session-scan/run?id=" + encodeURIComponent(runId)).then(function (r) {
        if (!r.ok) throw new Error(r.status + " " + r.statusText);
        return r.json();
      }).then(function (data) {
        state.runDetails.set(runId, data);
        return data;
      });
  request.then(function (data) {
    detailNode.dataset.loaded = "true";
    renderRunDetail(detailNode, data);
  }).catch(function (err) {
    detailNode.innerHTML = "";
    detailNode.appendChild(el("div", { class: "empty-state" }, "读取失败：" + err.message));
  });
}

function loadOlderRuns() {
  if (!state.scan || !state.scan.has_more) return;
  var content = q("#content");
  var scrollTop = content.scrollTop;
  var offset = state.scan.runs.length;
  fetch("/api/session-scan?limit=100&offset=" + offset).then(function (r) {
    if (!r.ok) throw new Error(r.status + " " + r.statusText);
    return r.json();
  }).then(function (data) {
    state.scan.runs = state.scan.runs.concat(data.runs || []);
    state.scan.has_more = !!data.has_more;
    renderScan();
    q("#content").scrollTop = scrollTop;
  }).catch(function (err) {
    q("#meta").textContent = "加载更早轮次失败：" + err.message;
  });
}

function renderScan() {
  var data = state.scan;
  var content = q("#content");
  var sidebar = q(".sidebar");
  sidebar.style.display = "none";
  content.style.gridColumn = "1 / -1";
  content.innerHTML = "";
  if (!data || !data.exists) {
    content.appendChild(el("div", { class: "placeholder" }, "暂无会话扫描记录"));
    return;
  }
  var latestRun = data.runs && data.runs[0];
  content.appendChild(el("div", { class: "scan-intro" },
    el("div", { class: "repo-header" },
      el("div", { class: "eyebrow" }, "Session scan ledger"),
      el("h2", null, "扫描任务"),
      el("div", { class: "path mono" }, data.scanRoot)
    ),
    latestRun ? el("div", { class: "scan-live" }, "最近触发 " + formatDateTime(latestRun.started_at)) : null
  ));
  var totalsData = data.totals || {};
  var totals = el("div", { class: "stat-row" });
  totals.appendChild(stat("触发轮次", data.run_count));
  totals.appendChild(stat("完成任务", Number(totalsData.done || 0).toLocaleString()));
  totals.appendChild(stat("无需写入", Number(totalsData.summary_skipped || 0).toLocaleString()));
  totals.appendChild(stat("失败尝试", Number(totalsData.failed || 0).toLocaleString()));
  totals.appendChild(stat("空轮询", Number(totalsData.idle_runs || 0).toLocaleString()));
  content.appendChild(totals);

  var pulsePanel = el("div", { class: "pulse-panel" });
  pulsePanel.appendChild(el("div", { class: "pulse-header" },
    el("span", null, "最近 " + Math.min(50, data.runs.length) + " 轮"),
    el("span", null, "每个竖条代表一次调度触发")
  ));
  var pulseStrip = el("div", { class: "pulse-strip" });
  data.runs.slice(0, 50).reverse().forEach(function (run) {
    var pulse = el("button", {
      class: "pulse " + run.outcome,
      title: formatDateTime(run.started_at) + " · " + outcomeLabel(run.outcome) + " · " + run.run_id,
      "aria-label": outcomeLabel(run.outcome) + "，" + formatDateTime(run.started_at),
    });
    pulse.onclick = function () {
      var target = document.getElementById("run-" + run.run_id);
      if (target) {
        if (!target.classList.contains("open")) toggleRun(target, run.run_id);
        target.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    };
    pulseStrip.appendChild(pulse);
  });
  pulsePanel.appendChild(pulseStrip);
  pulsePanel.appendChild(el("div", { class: "pulse-legend" },
    el("span", null, el("i"), "空轮询"),
    el("span", { class: "ok" }, el("i"), "完成任务"),
    el("span", { class: "work" }, el("i"), "候选 / 预演"),
    el("span", { class: "bad" }, el("i"), "有失败")
  ));
  content.appendChild(pulsePanel);

  content.appendChild(el("h3", { class: "section-title" }, "逐轮账本"));
  var ledger = el("div", { class: "run-ledger" });
  data.runs.forEach(function (run) {
    var card = el("article", { class: "run-card", id: "run-" + run.run_id });
    var summary = el("button", { class: "run-summary", "aria-expanded": "false" },
      el("div", null,
        el("div", { class: "run-time" }, formatDateTime(run.started_at)),
        el("div", { class: "run-id mono" }, run.run_id + " · " + formatDuration(run.duration_ms))
      ),
      el("div", null,
        el("span", { class: "status-pill " + run.outcome }, outcomeLabel(run.outcome)),
        el("div", { class: "run-engine" }, [run.executor || "未调用模型", run.model].filter(Boolean).join(" / "))
      ),
      el("div", { class: "run-metric" }, el("strong", null, run.candidate_count), el("span", null, "候选")),
      el("div", { class: "run-metric" }, el("strong", null, run.done_count), el("span", null, "完成")),
      el("div", { class: "run-metric" }, el("strong", null, run.failed_count), el("span", null, "失败")),
      el("div", { class: "run-metric" }, el("strong", null, formatBytes(run.observed_new_bytes)), el("span", null, "观察新增")),
      el("span", { class: "run-chevron", "aria-hidden": "true" }, "›")
    );
    var detail = el("div", { class: "run-detail" });
    summary.onclick = function () { toggleRun(card, run.run_id); };
    card.appendChild(summary);
    card.appendChild(detail);
    ledger.appendChild(card);
  });
  content.appendChild(ledger);
  if (data.has_more) {
    var more = el("button", { class: "icon-btn", style: "display:block;margin:14px auto 0;" }, "加载更早轮次");
    more.onclick = loadOlderRuns;
    content.appendChild(more);
  }

  if (data.repos.length) {
    content.appendChild(el("h3", { class: "section-title" }, "仓库累计"));
    var repoTable = el("table", { class: "scan-table" });
    repoTable.innerHTML = "<thead><tr><th>仓库 / 分支</th><th class='num'>会话</th><th class='num'>完成</th><th class='num'>失败</th><th class='num'>总结 Token</th><th>最近扫描</th></tr></thead>";
    var repoBody = el("tbody");
    data.repos.forEach(function (repo) {
      repoBody.appendChild(el("tr", null,
        el("td", null, el("div", { class: "mono" }, repo.repo_key), el("div", { class: "sub" }, repo.branches.join(", "))),
        el("td", { class: "num" }, repo.session_count),
        el("td", { class: "num" }, repo.done),
        el("td", { class: "num" }, repo.failed),
        el("td", { class: "num" }, Number(repo.summary_tokens || 0).toLocaleString()),
        el("td", null, formatDateTime(repo.last_scanned_at))
      ));
    });
    repoTable.appendChild(repoBody);
    content.appendChild(repoTable);
  }
}

function setView(view) {
  state.view = view;
  q("#memoryView").classList.toggle("active", view === "memory");
  q("#scanView").classList.toggle("active", view === "scan");
  if (view === "scan") {
    fetch("/api/session-scan?limit=100&offset=0").then(function (r) { return r.json(); }).then(function (data) {
      state.scan = data;
      q("#meta").textContent = data.run_count + " 轮任务扫描 · " + data.repos.length + " 个仓库 · " + data.scanRoot;
      renderScan();
    }).catch(function (err) { q("#meta").textContent = "错误：" + err.message; });
  } else {
    q(".sidebar").style.display = "block";
    q("#content").style.gridColumn = "";
    loadTree();
  }
}

function renderRepoList(repos, filterText) {
  var list = q("#repoList");
  list.innerHTML = "";
  var filtered = repos;
  if (filterText) {
    var ft = filterText.toLowerCase();
    filtered = repos.filter(function (r) {
      var haystack = (r.key + " " + (r.repoRoot || "") + " " + (r.identity || "") + " " + displayName(r)).toLowerCase();
      return haystack.indexOf(ft) !== -1;
    });
  }
  if (filtered.length === 0) {
    list.appendChild(el("div", { class: "empty-state" }, "无匹配仓库"));
    return;
  }
  for (var i = 0; i < filtered.length; i++) {
    (function (r) {
      var card = el("div", { class: "repo-card" + (r.key === state.selectedRepoKey ? " active" : "") });
      card.appendChild(el("div", { class: "name" }, displayName(r)));
      card.appendChild(el("div", { class: "sub mono" }, r.key));
      var badges = el("div", { class: "badges" });
      badges.appendChild(el("span", { class: "tag" }, r.branches.length + " 个活跃分支"));
      if (r.archived.length) badges.appendChild(el("span", { class: "tag archived" }, r.archived.length + " 个归档"));
      card.appendChild(badges);
      card.onclick = function () { selectRepo(r.key); };
      list.appendChild(card);
    })(filtered[i]);
  }
}

function selectRepo(key) {
  state.selectedRepoKey = key;
  var repo = state.tree.repos.find(function (r) { return r.key === key; });
  var def = (repo && repo.branches[0]) || (repo && repo.archived[0]) || null;
  state.selectedBranch = def ? { name: def.name, archived: def.archived } : null;
  renderRepoList(state.tree.repos, q("#search").value);
  renderContent();
  q("#content").scrollTop = 0;
}

function selectBranch(name, archived) {
  state.selectedBranch = { name: name, archived: archived };
  renderContent();
}

function buildFileCard(file, relPath) {
  var card = el("div", { class: "file-card clickable" });
  var header = el("header", null,
    el("span", { class: "fname mono" }, file.name),
    el("span", { class: "fmeta mono" }, (file.size != null ? (file.size + " B") : ""))
  );
  var preview = el("div", { class: "preview" }, el("span", { class: "loading" }, "加载中…"));
  var expandBtn = el("div", { class: "expand-btn" }, "展开全部 →");
  expandBtn.onclick = function (e) { e.stopPropagation(); openModal(relPath); };
  card.appendChild(header);
  card.appendChild(preview);
  card.appendChild(expandBtn);
  card.onclick = function () { openModal(relPath); };

  fetchFile(relPath).then(function (text) {
    preview.innerHTML = "";
    preview.classList.remove("plain", "empty");
    if (!text || !text.trim()) {
      preview.classList.add("plain", "empty");
      preview.textContent = "（空文件）";
      expandBtn.style.display = "none";
      card.classList.remove("clickable");
      card.onclick = null;
      return;
    }
    var isMd = /\.md$/i.test(file.name);
    if (isMd) {
      var wrap = document.createElement("div");
      wrap.className = "md";
      wrap.innerHTML = renderMd(text);
      preview.appendChild(wrap);
    } else {
      preview.classList.add("plain");
      preview.textContent = text;
    }
    if (preview.scrollHeight > preview.clientHeight + 2) {
      preview.classList.add("truncated");
    } else {
      expandBtn.style.display = "none";
    }
  }).catch(function (err) {
    preview.innerHTML = "";
    preview.classList.add("plain");
    preview.textContent = "加载失败：" + err.message;
    expandBtn.style.display = "none";
  });

  return card;
}

function renderContent() {
  var content = q("#content");
  var repo = state.tree.repos.find(function (r) { return r.key === state.selectedRepoKey; });
  content.innerHTML = "";
  if (!repo) {
    content.appendChild(el("div", { class: "placeholder" }, "← 从左侧选择一个仓库"));
    return;
  }

  var header = el("div", { class: "repo-header" },
    el("h2", null, displayName(repo)),
    el("div", { class: "repo-key mono" }, repo.key),
    repo.repoRoot ? el("div", { class: "path mono" }, repo.repoRoot) : null,
    !repo.repoRoot && repo.identity ? el("div", { class: "path mono" }, repo.identity) : null
  );
  content.appendChild(header);

  var stats = el("div", { class: "stat-row" });
  stats.appendChild(stat("活跃分支", repo.branches.length));
  stats.appendChild(stat("归档分支", repo.archived.length));
  var repoMdFiles = repo.repoLevel.files.filter(function (f) { return f.name.endsWith(".md"); });
  stats.appendChild(stat("仓库级文件", repoMdFiles.length));
  if (repo.updatedAt) stats.appendChild(stat("最近更新", formatDateShort(repo.updatedAt), true));
  if (repo.lastSeenBranch) stats.appendChild(stat("上次所在分支", repo.lastSeenBranch, true));
  content.appendChild(stats);

  if (repoMdFiles.length) {
    content.appendChild(el("h3", { class: "section-title" }, "仓库级记忆"));
    var repoGrid = el("div", { class: "file-grid" });
    for (var i = 0; i < repoMdFiles.length; i++) {
      var f = repoMdFiles[i];
      repoGrid.appendChild(buildFileCard(f, fileRelPath(repo.key, null, f.name, "repo")));
    }
    content.appendChild(repoGrid);
  }

  var allBranches = repo.branches.concat(repo.archived);
  content.appendChild(el("h3", { class: "section-title" }, "分支（" + allBranches.length + "）"));

  if (allBranches.length === 0) {
    content.appendChild(el("div", { class: "empty-state" }, "暂无分支"));
    return;
  }

  var bar = el("div", { class: "branch-bar" });
  for (var b = 0; b < allBranches.length; b++) {
    (function (branch) {
      var isActive = state.selectedBranch && state.selectedBranch.name === branch.name && state.selectedBranch.archived === branch.archived;
      var tab = el("div", { class: "branch-tab" + (isActive ? " active" : "") },
        branch.name,
        branch.archived ? el("span", { class: "tag archived" }, "已归档") : null
      );
      tab.onclick = function () { selectBranch(branch.name, branch.archived); };
      bar.appendChild(tab);
    })(allBranches[b]);
  }
  content.appendChild(bar);

  var cur = allBranches.find(function (x) {
    return state.selectedBranch && x.name === state.selectedBranch.name && x.archived === state.selectedBranch.archived;
  });
  if (!cur) return;

  if (cur.manifest) {
    var bs = el("div", { class: "stat-row" });
    if (cur.manifest.updated_at) bs.appendChild(stat("最近更新", formatDateTime(cur.manifest.updated_at), true));
    if (cur.manifest.setup_completed === true) bs.appendChild(stat("Setup 状态", "已整理", true));
    else if (cur.manifest.setup_completed === false) bs.appendChild(stat("Setup 状态", "lazy（未整理）", true));
    if (cur.manifest.last_update_title) bs.appendChild(stat("最近条目", cur.manifest.last_update_title, true));
    if (cur.manifest.last_seen_head) bs.appendChild(stat("HEAD", cur.manifest.last_seen_head.slice(0, 7), true));
    content.appendChild(bs);
  }

  var previewBtn = el("button", { class: "icon-btn", style: "margin-bottom: 16px;" }, "👁 注入预览");
  previewBtn.onclick = function () { openInjectionPreview(repo.key, cur.name); };
  content.appendChild(previewBtn);

  var branchMdFiles = cur.files.filter(function (f) { return f.name.endsWith(".md"); });
  if (branchMdFiles.length === 0) {
    content.appendChild(el("div", { class: "empty-state" }, "该分支暂无记忆文件"));
    return;
  }
  var grid = el("div", { class: "file-grid" });
  var scope = cur.archived ? "branch-archived" : "branch-active";
  for (var k = 0; k < branchMdFiles.length; k++) {
    var bf = branchMdFiles[k];
    grid.appendChild(buildFileCard(bf, fileRelPath(repo.key, cur.name, bf.name, scope)));
  }
  content.appendChild(grid);
}

function setModalStatus(text, level) {
  var s = q("#modalStatus");
  s.textContent = text || "";
  s.className = "status" + (level ? " " + level : "");
}

function renderModalView() {
  var body = q("#modalBody");
  body.innerHTML = "";
  var text = modalState.text || "";
  var relPath = modalState.relPath || "";
  if (!text || !text.trim()) {
    body.appendChild(el("span", { class: "loading" }, "（空文件）"));
    return;
  }
  var isMd = /\.md$/i.test(relPath);
  if (isMd) {
    var wrap = document.createElement("div");
    wrap.className = "md";
    wrap.innerHTML = renderMd(text);
    body.appendChild(wrap);
  } else {
    var pre = document.createElement("pre");
    pre.className = "raw";
    pre.textContent = text;
    body.appendChild(pre);
  }
}

function renderModalEditor() {
  var body = q("#modalBody");
  body.innerHTML = "";
  var ta = document.createElement("textarea");
  ta.className = "editor mono";
  ta.id = "modalEditor";
  ta.value = modalState.text || "";
  ta.spellcheck = false;
  body.appendChild(ta);
  // focus on next tick so the modal is fully visible
  setTimeout(function () { ta.focus(); }, 0);
}

function updateModalButtons() {
  var canEdit = !state.readOnly && !!modalState.relPath;
  q("#modalEdit").hidden = !canEdit || modalState.editing;
  q("#modalSave").hidden = !canEdit || !modalState.editing;
  q("#modalCancel").hidden = !canEdit || !modalState.editing;
}

function enterEditMode() {
  if (state.readOnly) return;
  modalState.editing = true;
  setModalStatus("");
  renderModalEditor();
  updateModalButtons();
}

function exitEditMode() {
  modalState.editing = false;
  setModalStatus("");
  renderModalView();
  updateModalButtons();
}

function saveModalEdit() {
  if (!modalState.editing || !modalState.relPath) return;
  var ta = q("#modalEditor");
  if (!ta) return;
  var newText = ta.value;
  var saveBtn = q("#modalSave");
  var cancelBtn = q("#modalCancel");
  saveBtn.disabled = true;
  cancelBtn.disabled = true;
  setModalStatus("保存中…");
  fetch("/api/file?path=" + encodeURIComponent(modalState.relPath), {
    method: "PUT",
    headers: { "content-type": "text/plain; charset=utf-8" },
    body: newText,
  }).then(function (r) {
    if (!r.ok) {
      return r.text().then(function (msg) {
        throw new Error(r.status + " " + (msg || r.statusText));
      });
    }
    return r.json();
  }).then(function () {
    modalState.text = newText;
    state.fileCache.set(modalState.relPath, newText);
    modalState.editing = false;
    renderModalView();
    updateModalButtons();
    setModalStatus("已保存", "success");
    // refresh tree mtime/size in background; don't reset selection
    loadTree();
  }).catch(function (err) {
    setModalStatus("保存失败：" + err.message, "error");
  }).then(function () {
    saveBtn.disabled = false;
    cancelBtn.disabled = false;
  });
}

function openModal(relPath) {
  modalState.relPath = relPath;
  modalState.text = "";
  modalState.editing = false;
  q("#modalTitle").textContent = relPath;
  setModalStatus("");
  updateModalButtons();
  var body = q("#modalBody");
  body.innerHTML = "";
  body.appendChild(el("span", { class: "loading" }, "加载中…"));
  q("#modal").classList.add("open");
  fetchFile(relPath).then(function (text) {
    modalState.text = text || "";
    renderModalView();
    updateModalButtons();
  }).catch(function (err) {
    body.innerHTML = "";
    var pre = document.createElement("pre");
    pre.className = "raw";
    pre.textContent = "加载失败：" + err.message;
    body.appendChild(pre);
    // disable edit on load failure
    q("#modalEdit").hidden = true;
  });
}

function closeModal() {
  q("#modal").classList.remove("open");
  modalState.relPath = null;
  modalState.text = "";
  modalState.editing = false;
}

function openInjectionPreview(repoKey, branchName) {
  modalState.relPath = null;
  modalState.text = "";
  modalState.editing = false;
  q("#modalTitle").textContent = "注入预览 — " + branchName;
  q("#modalEdit").hidden = true;
  q("#modalSave").hidden = true;
  q("#modalCancel").hidden = true;
  setModalStatus("");
  var body = q("#modalBody");
  body.innerHTML = "";
  body.appendChild(el("span", { class: "loading" }, "生成注入预览…"));
  q("#modal").classList.add("open");

  fetch("/api/injection-preview?repo=" + encodeURIComponent(repoKey) + "&branch=" + encodeURIComponent(branchName))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      body.innerHTML = "";
      if (data.error) {
        body.appendChild(el("pre", { class: "raw" }, "错误：" + data.error));
        return;
      }
      var text = data.context || "(空)";
      var pre = document.createElement("pre");
      pre.className = "raw";
      pre.style.whiteSpace = "pre-wrap";
      pre.style.wordBreak = "break-word";
      pre.textContent = text;
      body.appendChild(pre);
      setModalStatus(text.length + " 字符", "success");
    })
    .catch(function (err) {
      body.innerHTML = "";
      body.appendChild(el("pre", { class: "raw" }, "请求失败：" + err.message));
    });
}

function loadTree() {
  q("#meta").textContent = "加载中…";
  q("#repoList").innerHTML = '<div class="loading">加载中…</div>';
  return fetch("/api/tree").then(function (r) { return r.json(); }).then(function (data) {
    state.tree = data;
    state.readOnly = !!data.readOnly;
    if (!data.exists) {
      q("#meta").textContent = "未找到存储目录：" + data.storageRoot;
      q("#repoList").innerHTML = "";
      q("#repoList").appendChild(el("div", { class: "empty-state" }, "暂无仓库"));
      return;
    }
    var totalBranches = 0;
    var totalArchived = 0;
    for (var i = 0; i < data.repos.length; i++) {
      totalBranches += data.repos[i].branches.length;
      totalArchived += data.repos[i].archived.length;
    }
    var metaParts = [data.repos.length + " 个仓库", totalBranches + " 个活跃分支"];
    if (totalArchived) metaParts.push(totalArchived + " 个归档");
    metaParts.push(data.storageRoot);
    q("#meta").textContent = metaParts.join(" · ");
    renderRepoList(data.repos, q("#search").value);
    if (data.repos.length) {
      var stillExists = state.selectedRepoKey && data.repos.some(function (r) { return r.key === state.selectedRepoKey; });
      if (!stillExists) selectRepo(data.repos[0].key);
      else renderContent();
    }
  }).catch(function (err) {
    q("#meta").textContent = "错误：" + err.message;
  });
}

q("#search").addEventListener("input", function (e) {
  if (state.tree && state.tree.repos) renderRepoList(state.tree.repos, e.target.value);
});
q("#reload").addEventListener("click", function () {
  state.fileCache.clear();
  state.runDetails.clear();
  setView(state.view);
});
q("#memoryView").addEventListener("click", function () { setView("memory"); });
q("#scanView").addEventListener("click", function () { setView("scan"); });
q("#modalClose").addEventListener("click", closeModal);
q("#modalEdit").addEventListener("click", enterEditMode);
q("#modalSave").addEventListener("click", saveModalEdit);
q("#modalCancel").addEventListener("click", exitEditMode);
q("#modal").addEventListener("click", function (e) { if (e.target.id === "modal") closeModal(); });
document.addEventListener("keydown", function (e) {
  if (e.key === "Escape") {
    if (modalState.editing) exitEditMode();
    else closeModal();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === "s" && q("#modal").classList.contains("open") && modalState.editing) {
    e.preventDefault();
    saveModalEdit();
  }
});

loadTree();
</script>
</body>
</html>
