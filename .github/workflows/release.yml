name: Release

# Fires when a `vX.Y.Z` tag is pushed (e.g. `git tag v0.18.1 && git push --tags`).
# Runs pytest, verifies tag matches package.json, then publishes to npm via the
# package's Trusted Publisher configuration on npmjs.com — no long-lived
# NPM_TOKEN. GitHub mints a short-lived OIDC token at run time, npm verifies
# the configured (repo, workflow) pair, and the published artifact carries a
# provenance attestation users can verify.
#
# workflow_dispatch is also wired in so you can re-run a failed publish from
# the Actions tab using an existing tag (no retag needed).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-publish (e.g. v0.18.0)'
        required: true

permissions:
  # `contents: write` lets softprops/action-gh-release create the GitHub
  # release. `id-token: write` is what mints the OIDC token npm uses for
  # trusted-publisher auth + provenance.
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # OIDC trusted-publisher auth needs npm >= 11.5.1, which only
          # ships with Node 22.14.0+. Pinning to Node 24 (the version the
          # npm docs example uses) keeps us safely above that. Without
          # this, `npm publish` signs the provenance fine but falls back
          # to a non-OIDC publish path and the registry returns PUT 404.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Resolve tag version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.ver.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Tag and package.json both at ${PKG_VERSION}"

      - name: Run tests
        run: pytest -q

      - name: Run package check
        run: npm run check

      - name: Publish to npm
        # Auth is OIDC via the package's Trusted Publisher entry (no
        # NODE_AUTH_TOKEN). `--provenance` is what triggers the OIDC
        # exchange with npm and emits the signed attestation.
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
