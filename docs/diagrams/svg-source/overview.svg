<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1040" width="1400" height="1040">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="router-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="1400" height="1040" fill="url(#bg)"/>

  <!-- ============== HEADER ============== -->
  <rect x="40" y="30" width="1320" height="80" rx="14" fill="url(#header-grad)" filter="url(#shadow)"/>
  <text x="70" y="68" font-size="28" font-weight="700" fill="#f8fafc">Dev-Memory Skill Suite</text>
  <text x="70" y="94" font-size="14" fill="#cbd5e1">repo + branch 双层开发记忆 · 6 skill · v0.13</text>
  <text x="1330" y="68" font-size="13" fill="#94a3b8" text-anchor="end" font-family="ui-monospace,monospace">@xluos/dev-memory-cli</text>
  <text x="1330" y="92" font-size="12" fill="#64748b" text-anchor="end">SessionStart hook · lazy init · v1→v2 自动迁移</text>

  <!-- ============== TRIGGER LAYER ============== -->
  <text x="70" y="158" font-size="13" font-weight="700" fill="#475569" letter-spacing="3">①  触发</text>
  <line x1="160" y1="153" x2="1360" y2="153" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="380" y="175" width="280" height="68" rx="34" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="420" cy="209" r="18" fill="#3b82f6"/>
  <text x="420" y="216" font-size="18" fill="white" text-anchor="middle">⚡</text>
  <text x="452" y="205" font-size="15" font-weight="700" fill="#1e293b">SessionStart hook</text>
  <text x="452" y="225" font-size="11" fill="#64748b">自动注入 repo + branch 上下文</text>

  <rect x="740" y="175" width="280" height="68" rx="34" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="780" cy="209" r="18" fill="#f59e0b"/>
  <text x="780" y="216" font-size="16" fill="white" text-anchor="middle">💬</text>
  <text x="812" y="205" font-size="15" font-weight="700" fill="#1e293b">用户诉求</text>
  <text x="812" y="225" font-size="11" fill="#64748b">"记一下" / "归档" / "整理一下"</text>

  <!-- arrows trigger → router -->
  <polyline points="520,243 520,290 700,290 700,335" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-slate)"/>
  <polyline points="880,243 880,290 700,290" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>

  <!-- ============== ROUTER ============== -->
  <text x="70" y="310" font-size="13" font-weight="700" fill="#475569" letter-spacing="3">②  路由</text>
  <line x1="160" y1="305" x2="1360" y2="305" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="500" y="335" width="400" height="98" rx="16" fill="url(#router-grad)" filter="url(#shadow)"/>
  <text x="700" y="372" font-size="22" font-weight="700" fill="white" text-anchor="middle">using-dev-memory</text>
  <text x="700" y="395" font-size="13" fill="#e9d5ff" text-anchor="middle">总入口路由器（整套 Skill 的第 6 个）</text>
  <text x="700" y="416" font-size="11" fill="#ddd6fe" text-anchor="middle">判断本轮要走 context / capture / setup / tidy / graduate</text>

  <!-- ============== SKILL SUITE ============== -->
  <text x="70" y="475" font-size="13" font-weight="700" fill="#475569" letter-spacing="3">③  Skill 套件 · 5 working skills</text>
  <line x1="430" y1="470" x2="1360" y2="470" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- column headers -->
  <text x="220" y="505" font-size="12" font-weight="700" fill="#0891b2" letter-spacing="1">⤺  读取  ·  cold start</text>
  <text x="540" y="505" font-size="12" font-weight="700" fill="#059669" letter-spacing="1">⤻  写入  ·  during work</text>
  <text x="1040" y="505" font-size="12" font-weight="700" fill="#b45309" letter-spacing="1" text-anchor="middle">⚙  维护  ·  housekeeping</text>

  <!-- ----- context (cyan) ----- -->
  <rect x="80" y="520" width="280" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="80" y="520" width="6" height="190" rx="3" fill="#06b6d4"/>
  <text x="110" y="552" font-size="17" font-weight="700" fill="#0e7490">dev-memory-context</text>
  <line x1="110" y1="562" x2="330" y2="562" stroke="#cffafe" stroke-width="1"/>
  <text x="110" y="585" font-size="13" fill="#475569" font-weight="600">tiered lookup · 恢复分支记忆</text>
  <text x="110" y="610" font-size="11" fill="#64748b">• 默认主上下文：branch/</text>
  <text x="110" y="628" font-size="11" fill="#64748b">• 兜底层：repo/ 共享</text>
  <text x="110" y="646" font-size="11" fill="#64748b">• lazy init：分支不存在自动建</text>
  <text x="110" y="690" font-size="11" font-style="italic" fill="#94a3b8">"上次到哪了" / "恢复一下"</text>

  <!-- ----- capture (green) ----- -->
  <rect x="400" y="520" width="280" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="400" y="520" width="6" height="190" rx="3" fill="#10b981"/>
  <text x="430" y="552" font-size="17" font-weight="700" fill="#047857">dev-memory-capture</text>
  <line x1="430" y1="562" x2="650" y2="562" stroke="#dcfce7" stroke-width="1"/>
  <text x="430" y="585" font-size="13" fill="#475569" font-weight="600">统一写入入口 · 合并 sync/update</text>
  <text x="430" y="610" font-size="11" fill="#64748b">• decisions / progress / risks</text>
  <text x="430" y="628" font-size="11" fill="#64748b">• glossary / unsorted</text>
  <text x="430" y="646" font-size="11" fill="#64748b">• pending-promotion · 跨分支候选</text>
  <text x="430" y="690" font-size="11" font-style="italic" fill="#94a3b8">"记一下" / "立个规矩" / checkpoint</text>

  <!-- ----- setup (amber) ----- -->
  <rect x="720" y="520" width="200" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="720" y="520" width="6" height="190" rx="3" fill="#f59e0b"/>
  <text x="750" y="552" font-size="15" font-weight="700" fill="#b45309">setup</text>
  <line x1="750" y1="562" x2="890" y2="562" stroke="#fef3c7" stroke-width="1"/>
  <text x="750" y="585" font-size="12" fill="#475569" font-weight="600">unsorted → 分类</text>
  <text x="750" y="612" font-size="10" fill="#64748b">提升为 decisions /</text>
  <text x="750" y="628" font-size="10" fill="#64748b">progress / risks / glossary</text>
  <text x="750" y="644" font-size="10" fill="#64748b">+ 标 setup_completed</text>
  <text x="750" y="690" font-size="10" font-style="italic" fill="#94a3b8">"整理 dev-memory"</text>

  <!-- ----- tidy (amber) ----- -->
  <rect x="940" y="520" width="200" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="940" y="520" width="6" height="190" rx="3" fill="#f59e0b"/>
  <text x="970" y="552" font-size="15" font-weight="700" fill="#b45309">tidy</text>
  <line x1="970" y1="562" x2="1110" y2="562" stroke="#fef3c7" stroke-width="1"/>
  <text x="970" y="585" font-size="12" fill="#475569" font-weight="600">校准漂移条目</text>
  <text x="970" y="612" font-size="10" fill="#64748b">浏览器 review →</text>
  <text x="970" y="628" font-size="10" fill="#64748b">accept/reject 每条 proposal</text>
  <text x="970" y="644" font-size="10" fill="#64748b">apply 落盘 + 自动备份</text>
  <text x="970" y="690" font-size="10" font-style="italic" fill="#94a3b8">"清下过期的"</text>

  <!-- ----- graduate (amber) ----- -->
  <rect x="1160" y="520" width="200" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="1160" y="520" width="6" height="190" rx="3" fill="#f59e0b"/>
  <text x="1190" y="552" font-size="15" font-weight="700" fill="#b45309">graduate</text>
  <line x1="1190" y1="562" x2="1330" y2="562" stroke="#fef3c7" stroke-width="1"/>
  <text x="1190" y="585" font-size="12" fill="#475569" font-weight="600">分支收尾归档</text>
  <text x="1190" y="612" font-size="10" fill="#64748b">pending-promotion</text>
  <text x="1190" y="628" font-size="10" fill="#64748b">→ repo/ 上提</text>
  <text x="1190" y="644" font-size="10" fill="#64748b">分支 → _archived/</text>
  <text x="1190" y="690" font-size="10" font-style="italic" fill="#94a3b8">"merge 完了清一下"</text>

  <!-- arrows router → skills (fan out at y=460 horizontal bus) -->
  <polyline points="700,433 700,460 220,460 220,520" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <polyline points="700,460 540,460 540,520" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <polyline points="700,460 820,460 820,520" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <polyline points="820,460 1040,460 1040,520" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <polyline points="1040,460 1260,460 1260,520" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>

  <!-- ============== STORAGE LAYER ============== -->
  <text x="70" y="765" font-size="13" font-weight="700" fill="#475569" letter-spacing="3">④  存储</text>
  <text x="160" y="765" font-size="13" font-weight="600" fill="#64748b" font-family="ui-monospace,monospace">~/.dev-memory/repos/&lt;repo-key&gt;/</text>
  <line x1="540" y1="760" x2="1360" y2="760" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="80" y="785" width="1280" height="220" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- repo/ -->
  <rect x="120" y="815" width="380" height="170" rx="10" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="843" font-size="14" font-weight="700" fill="#0f172a">📁 repo/</text>
  <text x="180" y="843" font-size="12" fill="#0891b2" font-weight="600">· 跨分支共享层</text>
  <text x="140" y="862" font-size="11" fill="#64748b">长期稳定 · 跨分支通用结论 · graduate 上提目标</text>
  <line x1="140" y1="876" x2="480" y2="876" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="898" font-size="11" fill="#475569" font-family="ui-monospace,monospace">▸ manifest.json</text>
  <text x="140" y="918" font-size="11" fill="#475569" font-family="ui-monospace,monospace">▸ overview.md</text>
  <text x="140" y="938" font-size="11" fill="#475569" font-family="ui-monospace,monospace">▸ decisions.md  ·  glossary.md</text>
  <text x="140" y="958" font-size="11" fill="#475569" font-family="ui-monospace,monospace">▸ artifacts/</text>

  <!-- branches/ -->
  <rect x="540" y="815" width="780" height="170" rx="10" fill="white" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="843" font-size="14" font-weight="700" fill="#0f172a">📁 branches/</text>
  <text x="620" y="843" font-size="12" fill="#059669" font-weight="600">· 分支级工作记忆</text>
  <text x="560" y="862" font-size="11" fill="#64748b">默认主上下文 · per-branch 隔离 · capture 写入主目标</text>
  <line x1="560" y1="876" x2="1300" y2="876" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="560" y="888" width="370" height="84" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="580" y="910" font-size="12" font-weight="700" fill="#0e7490">📁 &lt;branch-key&gt;/  · active</text>
  <text x="580" y="930" font-size="10" fill="#475569" font-family="ui-monospace,monospace">▸ overview · progress · risks · decisions</text>
  <text x="580" y="948" font-size="10" fill="#475569" font-family="ui-monospace,monospace">▸ glossary · unsorted · pending-promotion</text>
  <text x="580" y="966" font-size="10" fill="#475569" font-family="ui-monospace,monospace">▸ artifacts/  ·  history/</text>

  <rect x="940" y="888" width="360" height="84" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="960" y="910" font-size="12" font-weight="700" fill="#475569">📁 _archived/</text>
  <text x="960" y="930" font-size="10" fill="#64748b">已归档分支（graduate 落地后移入）</text>
  <text x="960" y="948" font-size="10" fill="#64748b" font-style="italic">不再写入 · 只读历史</text>
  <text x="960" y="966" font-size="10" fill="#64748b" font-style="italic">graduate index 维护索引入口</text>

  <!-- arrows skills → storage (data-flow hints) -->
  <polyline points="220,710 220,750 280,750 280,815" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-cyan)" opacity="0.7"/>
  <polyline points="540,710 540,750 745,750 745,888" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)" opacity="0.7"/>
  <polyline points="1260,710 1260,800 1120,800 1120,888" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-slate)" opacity="0.6"/>

  <!-- legend bottom -->
  <g transform="translate(80, 1010)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-slate)"/>
    <text x="50" y="4" font-size="11" fill="#475569">控制流</text>
    <line x1="120" y1="0" x2="160" y2="0" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-cyan)"/>
    <text x="170" y="4" font-size="11" fill="#475569">读 (lookup)</text>
    <line x1="260" y1="0" x2="300" y2="0" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="310" y="4" font-size="11" fill="#475569">写 (capture)</text>
    <line x1="400" y1="0" x2="440" y2="0" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="450" y="4" font-size="11" fill="#475569">触发自动 / lazy init</text>
  </g>
</svg>
