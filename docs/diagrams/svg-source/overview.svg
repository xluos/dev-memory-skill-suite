<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1040" width="1400" height="1040">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="hook-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1400" height="1040" fill="url(#bg)"/>

  <!-- ============== HEADER ============== -->
  <rect x="40" y="30" width="1320" height="80" rx="14" fill="url(#header-grad)" filter="url(#shadow)"/>
  <text x="70" y="68" font-size="28" font-weight="700" fill="#f8fafc">Dev-Memory Skill Suite</text>
  <text x="70" y="94" font-size="14" fill="#cbd5e1">repo + branch 双层开发记忆 · 4 skills + branch CLI · v0.17</text>
  <text x="1330" y="68" font-size="13" fill="#94a3b8" text-anchor="end" font-family="ui-monospace,monospace">dev-memory-cli</text>
  <text x="1330" y="92" font-size="12" fill="#64748b" text-anchor="end">SessionStart hook · lazy init · v1→v2 自动迁移</text>

  <!-- ============== READ PATH (TOP) ============== -->
  <text x="70" y="158" font-size="13" font-weight="700" fill="#0891b2" letter-spacing="3">①  读取（无 skill）</text>
  <line x1="320" y1="153" x2="1360" y2="153" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- SessionStart hook -->
  <rect x="80" y="175" width="540" height="135" rx="14" fill="url(#hook-grad)" filter="url(#shadow)"/>
  <circle cx="120" cy="210" r="18" fill="white" opacity="0.25"/>
  <text x="120" y="217" font-size="18" fill="white" text-anchor="middle">⚡</text>
  <text x="155" y="208" font-size="17" font-weight="700" fill="white">SessionStart hook</text>
  <text x="155" y="230" font-size="11" fill="#dbeafe">每次会话开始自动跑：注入摘要 + 完整文件路径列表</text>
  <line x1="155" y1="240" x2="600" y2="240" stroke="#bfdbfe" stroke-width="0.5" opacity="0.4"/>
  <text x="100" y="262" font-size="11" fill="#eff6ff">▸ 跑 capture sync-working-tree 刷新 progress.md auto 区</text>
  <text x="100" y="281" font-size="11" fill="#eff6ff">▸ 抽 14 个 section（progress / risks / decisions / glossary / overview）</text>
  <text x="100" y="300" font-size="11" fill="#eff6ff">▸ footer 列绝对路径 → AI 直接 Read，无需 skill 中转</text>

  <!-- Read tool drill-down -->
  <rect x="660" y="175" width="320" height="135" rx="14" fill="white" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="208" font-size="15" font-weight="700" fill="#0e7490">Read tool drill-down</text>
  <line x1="680" y1="218" x2="950" y2="218" stroke="#cffafe" stroke-width="1"/>
  <text x="680" y="244" font-size="11" fill="#475569">注入未覆盖 / 段尾标 ↪ 截断时</text>
  <text x="680" y="266" font-size="11" fill="#64748b">→ AI 按 footer 列出的绝对路径直接 Read</text>
  <text x="680" y="288" font-size="11" fill="#64748b">→ 归档分支：grep -r 派 Task 子 agent</text>

  <!-- CLI fallback -->
  <rect x="1020" y="175" width="340" height="135" rx="14" fill="white" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="1040" y="208" font-size="14" font-weight="700" fill="#475569">CLI fallback (脚本 / 手动)</text>
  <line x1="1040" y1="218" x2="1340" y2="218" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1040" y="244" font-size="11" fill="#475569" font-family="ui-monospace,monospace">dev-memory-cli context show</text>
  <text x="1040" y="266" font-size="11" fill="#475569" font-family="ui-monospace,monospace">dev-memory-cli context sync</text>
  <text x="1040" y="290" font-size="10" font-style="italic" fill="#94a3b8">命令保留，仅不再以 skill 形式暴露</text>

  <polyline points="350,310 350,348 1170,348 1170,415" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr-cyan)" opacity="0.55"/>

  <!-- ============== TRIGGER LAYER ============== -->
  <text x="70" y="370" font-size="13" font-weight="700" fill="#059669" letter-spacing="3">②  触发 → Skills</text>
  <line x1="290" y1="365" x2="1360" y2="365" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="80" y="395" width="280" height="68" rx="34" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="120" cy="429" r="18" fill="#f59e0b"/>
  <text x="120" y="436" font-size="16" fill="white" text-anchor="middle">💬</text>
  <text x="152" y="425" font-size="15" font-weight="700" fill="#1e293b">用户诉求</text>
  <text x="152" y="445" font-size="11" fill="#64748b">"记一下" / "归档" / "整理一下"</text>

  <text x="380" y="435" font-size="12" fill="#94a3b8">→ 各 skill 自己 description 触发，无 router</text>

  <!-- ============== SKILL SUITE (4 cards) ============== -->
  <text x="70" y="500" font-size="13" font-weight="700" fill="#475569" letter-spacing="3">③  Skill 套件 · 4 working skills（写入 / 流程）</text>
  <line x1="690" y1="495" x2="1360" y2="495" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <text x="220" y="525" font-size="12" font-weight="700" fill="#059669" letter-spacing="1">⤻  写入  ·  during work</text>
  <text x="780" y="525" font-size="12" font-weight="700" fill="#b45309" letter-spacing="1" text-anchor="middle">⚙  维护  ·  housekeeping</text>

  <!-- == capture (green) == -->
  <rect x="80" y="540" width="380" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="80" y="540" width="6" height="190" rx="3" fill="#10b981"/>
  <text x="110" y="572" font-size="17" font-weight="700" fill="#047857">dev-memory-capture</text>
  <line x1="110" y1="582" x2="430" y2="582" stroke="#dcfce7" stroke-width="1"/>
  <text x="110" y="605" font-size="13" fill="#475569" font-weight="600">统一写入入口（合并 sync/update）</text>
  <text x="110" y="630" font-size="11" fill="#64748b">• 显式 kind / --auto 分类 / batch JSON</text>
  <text x="110" y="648" font-size="11" fill="#64748b">• 写 decisions / progress / risks / glossary</text>
  <text x="110" y="666" font-size="11" fill="#64748b">• unsorted 兜底 + pending-promotion 暂存</text>
  <text x="110" y="710" font-size="11" font-style="italic" fill="#94a3b8">"记一下" / "立个规矩" / checkpoint</text>

  <!-- == setup (amber) == -->
  <rect x="490" y="540" width="270" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="490" y="540" width="6" height="190" rx="3" fill="#f59e0b"/>
  <text x="520" y="572" font-size="16" font-weight="700" fill="#b45309">dev-memory-setup</text>
  <line x1="520" y1="582" x2="730" y2="582" stroke="#fef3c7" stroke-width="1"/>
  <text x="520" y="605" font-size="12" fill="#475569" font-weight="600">unsorted → 分类提升</text>
  <text x="520" y="630" font-size="10" fill="#64748b">• 把乱炖按 kind 分到</text>
  <text x="520" y="646" font-size="10" fill="#64748b">  decisions/progress/risks/glossary</text>
  <text x="520" y="664" font-size="10" fill="#64748b">• 标 setup_completed</text>
  <text x="520" y="710" font-size="10" font-style="italic" fill="#94a3b8">"整理 dev-memory"</text>

  <!-- == tidy (amber) == -->
  <rect x="790" y="540" width="270" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="790" y="540" width="6" height="190" rx="3" fill="#f59e0b"/>
  <text x="820" y="572" font-size="16" font-weight="700" fill="#b45309">dev-memory-tidy</text>
  <line x1="820" y1="582" x2="1030" y2="582" stroke="#fef3c7" stroke-width="1"/>
  <text x="820" y="605" font-size="12" fill="#475569" font-weight="600">校准漂移条目（破坏性）</text>
  <text x="820" y="630" font-size="10" fill="#64748b">• 浏览器 review proposal</text>
  <text x="820" y="646" font-size="10" fill="#64748b">• accept / reject / custom</text>
  <text x="820" y="664" font-size="10" fill="#64748b">• apply 落盘 + 自动备份</text>
  <text x="820" y="710" font-size="10" font-style="italic" fill="#94a3b8">"清下过期的"</text>

  <!-- == graduate (amber) == -->
  <rect x="1090" y="540" width="270" height="190" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="1090" y="540" width="6" height="190" rx="3" fill="#f59e0b"/>
  <text x="1120" y="572" font-size="16" font-weight="700" fill="#b45309">dev-memory-graduate</text>
  <line x1="1120" y1="582" x2="1330" y2="582" stroke="#fef3c7" stroke-width="1"/>
  <text x="1120" y="605" font-size="12" fill="#475569" font-weight="600">分支收尾归档（破坏性）</text>
  <text x="1120" y="630" font-size="10" fill="#64748b">• pending-promotion → repo 共享层</text>
  <text x="1120" y="646" font-size="10" fill="#64748b">• 分支 → _archived/</text>
  <text x="1120" y="664" font-size="10" fill="#64748b">• 必须显式触发</text>
  <text x="1120" y="710" font-size="10" font-style="italic" fill="#94a3b8">"merge 完了清一下"</text>

  <!-- (trigger → skills 箭头已移除：positional 布局 + "无 router" 文字提示已经表达分发关系，箭头会与 ③ section header 重叠) -->

  <!-- ============== BRANCH LIFECYCLE CLI ============== -->
  <text x="70" y="775" font-size="13" font-weight="700" fill="#7c3aed" letter-spacing="3">④  分支记忆生命周期 · CLI</text>
  <line x1="430" y1="770" x2="1360" y2="770" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="80" y="790" width="1280" height="110" rx="12" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="818" font-size="14" font-weight="700" fill="#6d28d9" font-family="ui-monospace,monospace">dev-memory-cli branch</text>
  <text x="270" y="818" font-size="12" fill="#475569">交互式分支记忆操作（type-ahead 候选 · 默认 abort + --backup / --force 三档冲突）</text>
  <line x1="105" y1="828" x2="1340" y2="828" stroke="#e9d5ff" stroke-width="1"/>

  <!-- column headers -->
  <text x="195" y="848" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing="2">单分支</text>
  <text x="555" y="848" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing="2">跨分支（A → B）</text>

  <!-- vertical column divider -->
  <line x1="525" y1="838" x2="525" y2="893" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Row 1: 创建 -->
  <text x="115" y="870" font-size="11" font-weight="700" fill="#16a34a">⊕ 创建</text>
  <text x="195" y="870" font-size="11" fill="#1e293b" font-family="ui-monospace,monospace">init</text>
  <text x="240" y="870" font-size="11" fill="#64748b">从零创建空骨架</text>
  <text x="545" y="870" font-size="11" fill="#1e293b" font-family="ui-monospace,monospace">fork A B</text>
  <text x="640" y="870" font-size="11" fill="#64748b">从 A 完整复制到 B（保留 A · 自动重写"## 分支" + overview 起源 stamp）</text>

  <!-- Row 2: 改写/销毁 -->
  <text x="115" y="888" font-size="11" font-weight="700" fill="#dc2626">↻ 改写</text>
  <text x="195" y="888" font-size="11" fill="#1e293b" font-family="ui-monospace,monospace">delete</text>
  <text x="265" y="888" font-size="11" fill="#64748b">移除分支记忆（--force 自带 /tmp 安全网，可恢复）</text>
  <text x="545" y="888" font-size="11" fill="#1e293b" font-family="ui-monospace,monospace">rename A B</text>
  <text x="655" y="888" font-size="11" fill="#64748b">A 改名/迁出到 B（A 移除）</text>

  <!-- ============== STORAGE LAYER ============== -->
  <text x="70" y="918" font-size="13" font-weight="700" fill="#475569" letter-spacing="3">⑤  存储</text>
  <text x="160" y="918" font-size="13" font-weight="600" fill="#64748b" font-family="ui-monospace,monospace">~/.dev-memory/repos/&lt;repo-key&gt;/</text>
  <line x1="490" y1="913" x2="1360" y2="913" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,4"/>

  <rect x="80" y="935" width="1280" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <rect x="105" y="955" width="320" height="44" rx="6" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <text x="125" y="975" font-size="12" font-weight="700" fill="#0f172a">📁 repo/  · 跨分支共享层</text>
  <text x="125" y="992" font-size="10" fill="#64748b" font-family="ui-monospace,monospace">overview · decisions · glossary · log · manifest</text>

  <rect x="435" y="955" width="600" height="44" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="455" y="975" font-size="12" font-weight="700" fill="#0e7490">📁 branches/&lt;active&gt;/  · 当前分支（per-branch 隔离）</text>
  <text x="455" y="992" font-size="10" fill="#475569" font-family="ui-monospace,monospace">overview · progress · risks · decisions · glossary · log · unsorted · pending-promotion · manifest</text>

  <rect x="1055" y="955" width="285" height="44" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1075" y="975" font-size="12" font-weight="700" fill="#475569">📁 branches/_archived/  · 历史</text>
  <text x="1075" y="992" font-size="10" fill="#64748b">graduate 落地后移入 · 只读 · grep 检索</text>
</svg>
