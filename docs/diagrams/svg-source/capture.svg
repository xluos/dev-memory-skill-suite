<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .title { font-size: 30px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 15px; fill: #cbd5e1; }
      .section { font-size: 15px; font-weight: 700; fill: #334155; }
      .box-title { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .box-copy { font-size: 13px; fill: #475569; }
      .small { font-size: 12px; fill: #64748b; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#f8fafc"/>
  <rect x="40" y="32" width="1320" height="100" rx="8" fill="#1e293b"/>
  <text class="ui title" x="72" y="78">Capture 写入路由</text>
  <text class="ui subtitle" x="72" y="108">显式语义优先 · 模糊内容保守兜底 · 纠错时改写原 entry</text>
  <text class="mono subtitle" x="1328" y="84" text-anchor="end">dev-memory-cli capture</text>

  <text class="ui section" x="56" y="176">输入</text>
  <line x1="102" y1="171" x2="1344" y2="171" stroke="#cbd5e1" stroke-dasharray="4 5"/>
  <g filter="url(#shadow)">
    <rect x="80" y="202" width="350" height="104" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="525" y="202" width="350" height="104" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <rect x="970" y="202" width="350" height="104" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  </g>
  <text class="ui box-title" x="104" y="238">显式 kind</text>
  <text class="mono box-copy" x="104" y="267">record --kind decision ...</text>
  <text class="ui small" x="104" y="290">最准确，直接选择目标文件与 section</text>
  <text class="ui box-title" x="549" y="238">自动分类</text>
  <text class="mono box-copy" x="549" y="267">record --auto --content ...</text>
  <text class="ui small" x="549" y="290">decision / risk / glossary；否则 unsorted</text>
  <text class="ui box-title" x="994" y="238">结构化批量输入</text>
  <text class="mono box-copy" x="994" y="267">--summary-json / apply-summary-output</text>
  <text class="ui small" x="994" y="290">一次会话可产生多项独立写入</text>

  <path d="M255 306 V350 H700" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M700 306 V350" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M1145 306 V350 H700" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M700 350 V382" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="500" y="398" width="400" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" filter="url(#shadow)"/>
  <text class="ui box-title" x="528" y="428">按 kind 路由</text>
  <text class="ui box-copy" x="528" y="454">确定 scope、文件、section 与 append/upsert 模式</text>

  <path d="M700 470 V510" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M225 510 H1175" fill="none" stroke="#64748b" stroke-width="2"/>
  <path d="M225 510 V538" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540 510 V538" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M860 510 V538" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1175 510 V538" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="554" width="306" height="140" rx="8" fill="#ecfeff" stroke="#0891b2"/>
    <rect x="387" y="554" width="306" height="140" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <rect x="702" y="554" width="306" height="140" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <rect x="1017" y="554" width="311" height="140" rx="8" fill="#f3e8ff" stroke="#9333ea"/>
  </g>
  <text class="ui box-title" x="96" y="590">append 型知识</text>
  <text class="mono box-copy" x="96" y="620">decision · risk · glossary · source</text>
  <text class="mono box-copy" x="96" y="646">shared-decision/context/source</text>
  <text class="ui small" x="96" y="674">写前相似度检查；命中时先 review</text>
  <text class="ui box-title" x="411" y="590">upsert 型快照</text>
  <text class="mono box-copy" x="411" y="620">overview · scope · constraint</text>
  <text class="mono box-copy" x="411" y="646">filemap · shared-overview/constraint</text>
  <text class="ui small" x="411" y="674">替换目标 section 的当前有效状态</text>
  <text class="ui box-title" x="726" y="590">保守兜底</text>
  <text class="mono box-copy" x="726" y="620">unsorted</text>
  <text class="ui box-copy" x="726" y="646">无法明确分类时不猜测长期语义</text>
  <text class="ui small" x="726" y="674">后续由 setup 统一分类</text>
  <text class="ui box-title" x="1041" y="590">跨分支候选</text>
  <text class="mono box-copy" x="1041" y="620">pending-promotion.md</text>
  <text class="ui box-copy" x="1041" y="646">通用经验额外进入候选区</text>
  <text class="ui small" x="1041" y="674">graduate 审核后才上提 repo 层</text>

  <text class="ui section" x="56" y="746">落盘与纠错</text>
  <line x1="160" y1="741" x2="1344" y2="741" stroke="#cbd5e1" stroke-dasharray="4 5"/>
  <path d="M225 694 V774" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540 694 V774" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M855 694 V774" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1172 694 V774" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="72" y="790" width="1256" height="72" rx="8" fill="#fff" stroke="#64748b" filter="url(#shadow)"/>
  <text class="ui box-title" x="96" y="821">写入目标文件，更新 manifest 与 log</text>
  <text class="ui box-copy" x="96" y="847">append 命中旧条目时：list/find → rewrite-entry / delete-entry / force / skip</text>
  <line x1="890" y1="804" x2="890" y2="848" stroke="#cbd5e1"/>
  <text class="ui box-title" x="918" y="821">不保存进度流水账</text>
  <text class="ui box-copy" x="918" y="847">progress.md 只承载 Git 派生导航与 filemap</text>
</svg>
